            <h2>Why we started</h2>
            <p>Empower wear began in small studio with one hoodie design and a question: what would it look like if empowerment was'nt a just a slogan
             rinted on a shirt, but something you can feel in the fit, the fabric, and the way a piece made you carry yourself?</p>
            <p>Every collection since has started and desined with input from the women who wear it - teachers,
            founders, students, and everyone in between - so the fit works as hard they do.</p>
            <p>We're still a small, independent brand. Every piece is made in small batches, which means
            less waste and more attention to detail on each one.</p>
